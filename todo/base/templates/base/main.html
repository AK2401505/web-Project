<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Todo App{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Jost', sans-serif; transition: background 0.3s ease; }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(45deg, #f06, #9f6);
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 2rem;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            color: white;
        }

        h1 {
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            text-align: center;
        }

        hr {
            margin: 15px 0;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* User info and logout section */
        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.15);
            padding: 10px 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .user-info p {
            margin: 0;
            font-weight: bold;
        }

        .user-info button, .add-task-btn {
            background: rgba(200, 16, 46, 0.7);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 20px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .user-info button:hover, .add-task-btn:hover {
            background: rgba(227, 27, 35, 0.9);
            transform: scale(1.05);
        }

        /* Search form */
        .search-form {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        .search-form input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.2);
            color: white;
            outline: none;
        }

        .search-form input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .search-form select {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
        }

        .search-form select option {
            background: #222;
            color: white;
        }

        .search-form button {
            padding: 0 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(200, 16, 46, 0.7);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-form button:hover {
            background: rgba(227, 27, 35, 0.9);
        }

        /* Table styles */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            text-align: left;
            padding: 12px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Task action links */
        .task-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .task-actions a, .task-actions form {
            display: inline-block;
        }

        .task-actions a {
            color: white;
            text-decoration: none;
            padding: 5px 12px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .task-actions a:hover {
            background: rgba(200, 16, 46, 0.7);
            transform: scale(1.05);
        }

        /* Form styles */
        .task-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .task-form input, .task-form textarea, .task-form select {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.2);
            color: white;
            outline: none;
        }

        .task-form input::placeholder, .task-form textarea::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .task-form label {
            font-weight: bold;
            margin-bottom: -10px;
        }

        .task-form button {
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: rgba(200, 16, 46, 0.7);
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .task-form button:hover {
            background: rgba(227, 27, 35, 0.9);
            transform: scale(1.02);
        }

        /* Delete confirmation */
        .delete-container {
            text-align: center;
            padding: 20px;
        }

        .delete-container p {
            margin: 20px 0;
            font-size: 18px;
        }

        .delete-container form {
            display: inline;
            margin: 0 10px;
        }

        .delete-container button, .cancel-btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .delete-container button {
            background: rgba(200, 16, 46, 0.8);
            color: white;
        }

        .cancel-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: rgba(255, 255, 255, 0.8);
        }

        .empty-state h3 {
            margin-bottom: 20px;
        }

        /* Auth links */
        .auth-links {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .auth-links a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            background: rgba(200, 16, 46, 0.7);
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .auth-links a:hover {
            background: rgba(227, 27, 35, 0.9);
            transform: scale(1.05);
        }

        /* Back link */
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: rgba(200, 16, 46, 0.7);
        }

        /* Task detail view */
        .task-detail {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
        }

        .task-detail p {
            margin: 10px 0;
            line-height: 1.5;
        }

        .task-detail strong {
            color: rgba(255, 255, 255, 0.9);
        }

        /* Progress Bar Container */
        .stat-container { 
            background: rgba(200, 16, 46, 0.7); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: white; 
            padding: 15px; 
            border-radius: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .progress-bar {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            height: 10px;
            width: 150px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background: #f1f1f1;
            border-radius: 10px;
            width: 0%;
            transition: 0.4s;
        }

        .numbers { 
            background: rgba(255, 255, 255, 0.15); 
            border: 1px solid rgba(255, 255, 255, 0.4);
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
        }

        /* Toggle Complete Button */
        .toggle-complete-btn {
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .toggle-complete-btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
            cursor: pointer;
        }

        .status-cell {
            text-align: center;
        }

        /* Theme Button */
        .theme-btn {
            transition: all 0.3s ease;
        }
        .theme-btn:hover {
            transform: scale(1.05);
        }

        /* DARK MODE STYLES */
        body.dark-mode {
            background: #121212;
        }

        body.dark-mode .container {
            background: rgba(30, 30, 30, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid #444;
            color: white;
        }

        body.dark-mode h1 {
            color: white;
        }

        body.dark-mode .user-info {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        body.dark-mode .task-actions a {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        body.dark-mode .task-actions a:hover {
            background: rgba(200, 16, 46, 0.7);
            color: white;
        }

        body.dark-mode .task-form input,
        body.dark-mode .task-form textarea,
        body.dark-mode .task-form select {
            background: #333;
            color: white;
            border: 1px solid #555;
        }

        body.dark-mode .search-form input,
        body.dark-mode .search-form select {
            background: #333;
            color: white;
            border: 1px solid #555;
        }

        body.dark-mode .search-form input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        body.dark-mode th {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        body.dark-mode td {
            border-bottom: 1px solid #333;
            color: white;
        }

        body.dark-mode .task-detail {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        body.dark-mode .delete-container {
            color: white;
        }

        body.dark-mode .delete-container button {
            background: rgba(200, 16, 46, 0.8);
        }

        body.dark-mode .cancel-btn {
            background: #333;
            color: white;
        }

        body.dark-mode .empty-state {
            color: rgba(255, 255, 255, 0.6);
        }

        body.dark-mode .empty-state h3 {
            color: white;
        }

        body.dark-mode .auth-links a {
            background: rgba(200, 16, 46, 0.7);
        }

        body.dark-mode .back-link {
            background: #333;
            color: white;
        }

        body.dark-mode .back-link:hover {
            background: rgba(200, 16, 46, 0.7);
        }

        body.dark-mode .stat-container {
            background: rgba(200, 16, 46, 0.7);
        }

        /* LIGHT MODE STYLES */
        body.light-mode {
            background: linear-gradient(45deg, #f06, #9f6);
        }

        body.light-mode .container {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }

        body.light-mode h1 {
            color: #333;
        }

        body.light-mode .user-info {
            background: rgba(0, 0, 0, 0.1);
            color: #333;
        }

        body.light-mode .task-actions a {
            background: rgba(0, 0, 0, 0.1);
            color: #333;
        }

        body.light-mode .task-actions a:hover {
            background: rgba(200, 16, 46, 0.7);
            color: white;
        }

        body.light-mode .task-form input,
        body.light-mode .task-form textarea,
        body.light-mode .task-form select {
            background: rgba(0, 0, 0, 0.1);
            color: #333;
            border: 1px solid rgba(0, 0, 0, 0.2);
        }

        body.light-mode .search-form input,
        body.light-mode .search-form select {
            background: rgba(0, 0, 0, 0.1);
            color: #333;
            border: 1px solid rgba(0, 0, 0, 0.2);
        }

        body.light-mode .search-form input::placeholder {
            color: rgba(0, 0, 0, 0.5);
        }

        body.light-mode th {
            background: rgba(0, 0, 0, 0.1);
            color: #333;
        }

        body.light-mode td {
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            color: #333;
        }

        body.light-mode .task-detail {
            background: rgba(0, 0, 0, 0.05);
            color: #333;
        }

        body.light-mode .delete-container {
            color: #333;
        }

        body.light-mode .delete-container button {
            background: rgba(200, 16, 46, 0.8);
            color: white;
        }

        body.light-mode .cancel-btn {
            background: rgba(0, 0, 0, 0.1);
            color: #333;
        }

        body.light-mode .empty-state {
            color: rgba(0, 0, 0, 0.6);
        }

        body.light-mode .empty-state h3 {
            color: #333;
        }

        body.light-mode .stat-container {
            background: rgba(200, 16, 46, 0.7);
            color: white;
        }
    </style>
</head>
<body class="{% if request.session.theme == 'light' %}light-mode{% elif request.session.theme == 'dark' %}dark-mode{% endif %}">
    <div class="container">
        <div style="display: flex; justify-content: flex-end; margin-bottom: 20px;">
            <form method="post" action="{% url 'toggle_theme' %}">
                {% csrf_token %}
                <button type="submit" class="theme-btn" style="
                    {% if request.session.theme == 'dark' %}
                        background: #fff; color: #333; border: 1px solid #ddd;
                    {% else %}
                        background: #333; color: white; border: 1px solid #555;
                    {% endif %}
                    padding: 8px 16px;
                    border-radius: 20px;
                    cursor: pointer;
                    font-size: 14px;
                    transition: all 0.3s ease;">
                    {% if request.session.theme == 'dark' %}
                        ☀️ Light Mode
                    {% else %}
                        🌙 Dark Mode
                    {% endif %}
                </button>
            </form>
        </div>
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
