{% extends 'base/main.html' %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<h1>🔑 Reset Password</h1>
<p>Setting new password for: <strong>{{ username }}</strong></p>

<form method="POST" class="task-form">
    {% csrf_token %}
    
    <div>
        <label>New Password:</label>
        <input type="password" name="password1" placeholder="Enter new password" required>
    </div>
    
    <div>
        <label>Confirm Password:</label>
        <input type="password" name="password2" placeholder="Confirm new password" required>
    </div>
    
    <button type="submit">Reset Password</button>
</form>

<p style="margin-top: 20px; text-align: center;">
    <a href="{% url 'login' %}" style="color: white; text-decoration: underline;">Back to Login</a>
</p>

<!-- Display messages -->
{% if messages %}
    {% for message in messages %}
        <div class="message" style="
            margin-top: 20px; 
            padding: 10px; 
            background: {% if 'success' in message.tags %}#2ecc71{% else %}#ff4d4d{% endif %}; 
            border-radius: 8px; 
            text-align: center;
            color: white;">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}
{% endblock %}
